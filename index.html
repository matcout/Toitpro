<!DOCTYPE html>
<html lang="fr">
<head>
<!-- ... (contenu existant inchangé) ... -->
  <style>
    /* ... (styles existants inchangés) ... */

    /* Nouveaux styles pour la grille de photos */
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
      margin-top: 15px;
    }

    .photo-item {
      position: relative;
      aspect-ratio: 1/1;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    }

    .photo-placeholder {
      width: 100%;
      height: 100%;
      background-color: #e9ecef;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--secondary);
      border: 2px dashed var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .photo-placeholder:hover {
      background-color: #dee2e6;
      border-color: var(--primary);
    }

    .photo-placeholder i {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
    }

    .photo-actions {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      padding: 8px;
      text-align: center;
      transform: translateY(100%);
      transition: transform 0.3s;
    }

    .photo-item:hover .photo-actions {
      transform: translateY(0);
    }

    .photo-btn {
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* Modal pour afficher les photos */
    #photoModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #modalContent {
      max-width: 90%;
      max-height: 90%;
      position: relative;
    }

    #modalContent img {
      max-width: 100%;
      max-height: 80vh;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
    }

    .photo-info {
      color: white;
      text-align: center;
      margin-top: 15px;
    }

    .close-modal {
      position: absolute;
      top: -40px;
      right: 0;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      background: none;
      border: none;
    }

    @media (min-width: 768px) {
      .photos-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ... (contenu existant inchangé) ... -->

    <!-- Page du formulaire de soumission -->
    <div id="form-page" style="display: none;">
      <!-- ... (contenu existant inchangé) ... -->

      <!-- Section Photos -->
      <div class="form-section">
        <h2 class="section-title">
          <i class="fas fa-camera"></i>
          Photos du projet
        </h2>
        <div class="photos-container">
          <p>Prenez des photos de la toiture pour documenter votre projet</p>
          <div class="photos-grid">
            <!-- Les photos seront ajoutées ici dynamiquement -->
            <div class="photo-item">
              <div class="photo-placeholder" onclick="takePhoto()">
                <i class="fas fa-plus-circle"></i>
                <span>Ajouter</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ... (contenu existant inchangé) ... -->
    </div>
  </div>

  <!-- Modal pour afficher les photos -->
  <div id="photoModal">
    <button class="close-modal" onclick="closeModal()">&times;</button>
    <div id="modalContent"></div>
  </div>

  <script>
    // Base de données simulée
    let soumissionsDB = JSON.parse(localStorage.getItem('soumissionsDB')) || [];
    let projectPhotos = [];
    let photoCounter = 0;

    // Initialisation
    document.addEventListener('DOMContentLoaded', function() {
      populateSelects();
      setupSearch();
      loadSavedPhotos();
      
      // Optimisation mobile: défilement automatique vers le champ actif
      document.querySelectorAll('input, select, textarea').forEach(el => {
        el.addEventListener('focus', () => {
          setTimeout(() => {
            window.scrollTo({
              top: el.getBoundingClientRect().top + window.pageYOffset - 100,
              behavior: 'smooth'
            });
          }, 100);
        });
      });
    });

    // Configuration de la recherche
    function setupSearch() {
      const searchInput = document.getElementById('search-input');
      searchInput.addEventListener('input', function() {
        const searchTerm = this.value.toLowerCase();
        const folders = document.querySelectorAll('.folder-item');
        
        folders.forEach(folder => {
          const title = folder.querySelector('h3').textContent.toLowerCase();
          if (title.includes(searchTerm)) {
            folder.style.display = 'flex';
          } else {
            folder.style.display = 'none';
          }
        });
      });
    }
    
    // Afficher le formulaire
    function showForm() {
      document.getElementById('main-page').style.display = 'none';
      document.getElementById('form-page').style.display = 'block';
      document.getElementById('year-page').style.display = 'none';
    }
    
    // Masquer le formulaire
    function hideForm() {
      document.getElementById('main-page').style.display = 'block';
      document.getElementById('form-page').style.display = 'none';
      document.getElementById('year-page').style.display = 'none';
    }
    
    // Ouvrir un dossier année
    function openYearFolder(year) {
      document.getElementById('main-page').style.display = 'none';
      document.getElementById('form-page').style.display = 'none';
      document.getElementById('year-page').style.display = 'block';
      
      const yearFolders = document.getElementById('year-folders');
      yearFolders.innerHTML = `
        <div class="folder-item" onclick="openSubFolder('${year}', 'Soumission')">
          <div class="folder-icon" style="background-color: var(--primary);">
            <i class="fas fa-file-signature"></i>
          </div>
          <div class="folder-content">
            <h3>Soumission</h3>
            <p>Documents de soumission</p>
          </div>
          <div class="folder-arrow">
            <i class="fas fa-chevron-right"></i>
          </div>
        </div>
        
        <div class="folder-item" onclick="openSubFolder('${year}', 'Contrat')">
          <div class="folder-icon" style="background-color: var(--success);">
            <i class="fas fa-file-contract"></i>
          </div>
          <div class="folder-content">
            <h3>Contrat</h3>
            <p>Contrats signés</p>
          </div>
          <div class="folder-arrow">
            <i class="fas fa-chevron-right"></i>
          </div>
        </div>
        
        <div class="folder-item" onclick="openSubFolder('${year}', 'Reparage')">
          <div class="folder-icon" style="background-color: var(--warning);">
            <i class="fas fa-tools"></i>
          </div>
          <div class="folder-content">
            <h3>Réparage</h3>
            <p>Documents de réparation</p>
          </div>
          <div class="folder-arrow">
            <i class="fas fa-chevron-right"></i>
          </div>
        </div>
        
        <div class="folder-item" onclick="openSubFolder('${year}', 'Inspection')">
          <div class="folder-icon" style="background-color: var(--danger);">
            <i class="fas fa-search"></i>
          </div>
          <div class="folder-content">
            <h3>Inspection</h3>
            <p>Rapports d'inspection</p>
          </div>
          <div class="folder-arrow">
            <i class="fas fa-chevron-right"></i>
          </div>
        </div>
      `;
    }
    
    // Ouvrir un sous-dossier
    function openSubFolder(year, type) {
      // Ici vous pouvez implémenter la logique pour afficher les documents spécifiques
      showNotification(`Ouverture des ${type} pour ${year}`, 'success');
    }
    
    // Retour à la page principale
    function backToMain() {
      document.getElementById('main-page').style.display = 'block';
      document.getElementById('form-page').style.display = 'none';
      document.getElementById('year-page').style.display = 'none';
    }
    
    // Remplir les sélecteurs
    function populateSelects() {
      // Dimensions principales et puit de lumière (0 à 200)
      const dimensionSelects = document.querySelectorAll(`
        select[id^="dimension"], 
        #puitLumiere1Dim1, #puitLumiere1Dim2,
        #puitLumiere2Dim1, #puitLumiere2Dim2
      `);
      
      dimensionSelects.forEach(select => {
        // Conserver l'option par défaut
        const defaultOption = select.options[0];
        select.innerHTML = '';
        select.appendChild(defaultOption);
        
        // Ajouter les options de 1 à 200
        for (let i = 1; i <= 200; i++) {
          const option = document.createElement('option');
          option.value = i;
          option.textContent = i;
          select.appendChild(option);
        }
      });
      
      // Autres sélecteurs (0 à 50)
      const smallSelects = [
        'nbFeuilles', 'nbMax', 'nbEvents', 'nbDrains',
        'trepiedElectrique', 'ff180', 'armorbound180'
      ];
      
      smallSelects.forEach(id => {
        const select = document.getElementById(id);
        for (let i = 0; i <= 50; i++) {
          const option = document.createElement('option');
          option.value = i;
          option.textContent = i;
          select.appendChild(option);
        }
      });
    }
    
    // Calcul de la superficie avec déduction des puits de lumière
    function calculerSuperficie() {
      const dim1 = parseFloat(document.getElementById('dimension1').value) || 0;
      const dim2 = parseFloat(document.getElementById('dimension2').value) || 0;
      const dim3 = parseFloat(document.getElementById('dimension3').value) || 0;
      const dim4 = parseFloat(document.getElementById('dimension4').value) || 0;
      
      // Calcul des puits de lumière
      const pl1Dim1 = parseFloat(document.getElementById('puitLumiere1Dim1').value) || 0;
      const pl1Dim2 = parseFloat(document.getElementById('puitLumiere1Dim2').value) || 0;
      const pl2Dim1 = parseFloat(document.getElementById('puitLumiere2Dim1').value) || 0;
      const pl2Dim2 = parseFloat(document.getElementById('puitLumiere2Dim2').value) || 0;
      
      const superficieTotale = (dim1 * dim2) + (dim3 * dim4);
      const superficiePuitsLumiere = (pl1Dim1 * pl1Dim2) + (pl2Dim1 * pl2Dim2);
      
      const superficieNet = Math.max(0, superficieTotale - superficiePuitsLumiere);
      document.getElementById('superficie').textContent = superficieNet;
    }
    
    // Réinitialisation
    function resetForm() {
      document.getElementById('soumissionForm').reset();
      document.getElementById('superficie').textContent = '0';
      projectPhotos = [];
      photoCounter = 0;
      updatePhotoGrid();
      localStorage.removeItem('projectPhotos');
      showNotification('Formulaire réinitialisé avec succès', 'success');
    }
    
    // Notifications
    function showNotification(message, type) {
      const notification = document.getElementById('notification');
      const messageElement = document.getElementById('notificationMessage');
      const icon = notification.querySelector('i');
      
      // Changer l'icône selon le type
      if (type === 'success') {
        icon.className = 'fas fa-check-circle';
      } else {
        icon.className = 'fas fa-exclamation-circle';
      }
      
      messageElement.textContent = message;
      notification.className = `notification ${type} show`;
      
      setTimeout(() => {
        notification.classList.remove('show');
      }, 3000);
    }
    
    // Fonction pour prendre une photo
    function takePhoto() {
      // Créer un élément input de type file
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.capture = 'camera'; // Pour forcer l'appareil photo sur mobile
      
      input.onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          
          reader.onload = function(event) {
            const photoData = {
              id: 'photo_' + Date.now(),
              data: event.target.result,
              date: new Date().toLocaleString(),
              description: 'Photo du projet'
            };
            
            projectPhotos.push(photoData);
            updatePhotoGrid();
            savePhotosToLocalStorage();
            
            showNotification('Photo ajoutée avec succès', 'success');
          };
          
          reader.readAsDataURL(file);
        }
      };
      
      input.click();
    }
    
    // Mettre à jour la grille de photos
    function updatePhotoGrid() {
      const photosGrid = document.querySelector('.photos-grid');
      photosGrid.innerHTML = '';
      
      // Ajouter les photos existantes
      projectPhotos.forEach((photo, index) => {
        const photoItem = document.createElement('div');
        photoItem.className = 'photo-item';
        
        const img = document.createElement('img');
        img.src = photo.data;
        img.alt = photo.description;
        img.onclick = () => showPhoto(photo.data, photo.description, photo.date);
        
        const photoActions = document.createElement('div');
        photoActions.className = 'photo-actions';
        
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'photo-btn';
        deleteBtn.innerHTML = '<i class="fas fa-trash"></i> Supprimer';
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          deletePhoto(index);
        };
        
        photoActions.appendChild(deleteBtn);
        photoItem.appendChild(img);
        photoItem.appendChild(photoActions);
        photosGrid.appendChild(photoItem);
      });
      
      // Ajouter le bouton pour ajouter une nouvelle photo
      const addPhotoItem = document.createElement('div');
      addPhotoItem.className = 'photo-item';
      
      const addPhotoPlaceholder = document.createElement('div');
      addPhotoPlaceholder.className = 'photo-placeholder';
      addPhotoPlaceholder.onclick = takePhoto;
      
      addPhotoPlaceholder.innerHTML = `
        <i class="fas fa-plus-circle"></i>
        <span>Ajouter</span>
      `;
      
      addPhotoItem.appendChild(addPhotoPlaceholder);
      photosGrid.appendChild(addPhotoItem);
    }
    
    // Supprimer une photo
    function deletePhoto(index) {
      projectPhotos.splice(index, 1);
      updatePhotoGrid();
      savePhotosToLocalStorage();
      showNotification('Photo supprimée', 'success');
    }
    
    // Afficher une photo en grand
    function showPhoto(src, description, date) {
      const modal = document.getElementById('photoModal');
      const modalContent = document.getElementById('modalContent');
      
      modalContent.innerHTML = `
        <img src="${src}" alt="${description}">
        <div class="photo-info">
          <p>${description}</p>
          <p><small>${date}</small></p>
        </div>
      `;
      
      modal.style.display = 'flex';
    }
    
    // Fermer le modal
    function closeModal() {
      document.getElementById('photoModal').style.display = 'none';
    }
    
    // Sauvegarder les photos dans le localStorage
    function savePhotosToLocalStorage() {
      localStorage.setItem('projectPhotos', JSON.stringify(projectPhotos));
    }
    
    // Charger les photos sauvegardées
    function loadSavedPhotos() {
      const savedPhotos = localStorage.getItem('projectPhotos');
      if (savedPhotos) {
        projectPhotos = JSON.parse(savedPhotos);
        updatePhotoGrid();
      }
    }
    
    // Enregistrement avec les nouveaux champs
    function enregistrerSoumission() {
      const adresse = document.getElementById('adresse').value.trim();
      if (!adresse) {
        showNotification('Veuillez saisir une adresse', 'error');
        return;
      }
      
      const soumission = {
        id: 'soum_' + Date.now(),
        date: new Date().toLocaleDateString('fr-CA'),
        annee: new Date().getFullYear(),
        type: 'Soumission',
        client: {
          nom: document.getElementById('nom').value,
          adresse: adresse,
          telephone: document.getElementById('telephone').value,
          courriel: document.getElementById('courriel').value
        },
        toiture: {
          dimensions: [
            { valeur: document.getElementById('dimension1').value },
            { valeur: document.getElementById('dimension2').value },
            { valeur: document.getElementById('dimension3').value },
            { valeur: document.getElementById('dimension4').value }
          ],
          superficie_totale: document.getElementById('superficie').textContent,
          plusieurs_epaisseurs: document.getElementById('plusieursEpaisseurs').checked
        },
        materiaux: {
          feuilles: document.getElementById('nbFeuilles').value,
          max: document.getElementById('nbMax').value,
          events: document.getElementById('nbEvents').value,
          drains: document.getElementById('nbDrains').value,
          trepied_electrique: document.getElementById('trepiedElectrique').value,
          ff180: document.getElementById('ff180').value,
          armorbound180: document.getElementById('armorbound180').value,
          puit_lumiere_1: {
            dim1: document.getElementById('puitLumiere1Dim1').value,
            dim2: document.getElementById('puitLumiere1Dim2').value
          },
          puit_lumiere_2: {
            dim1: document.getElementById('puitLumiere2Dim1').value,
            dim2: document.getElementById('puitLumiere2Dim2').value
          }
        },
        options: {
          hydro_quebec: document.getElementById('hydroQuebec').checked,
          grue: document.getElementById('grue').checked,
          trackfall: document.getElementById('trackfall').checked
        },
        notes: document.getElementById('notes').value,
        photos: projectPhotos // Inclure les photos dans les données
      };
      
      // Sauvegarder dans la base de données
      soumissionsDB.push(soumission);
      localStorage.setItem('soumissionsDB', JSON.stringify(soumissionsDB));
      
      showNotification(`Soumission enregistrée pour ${soumission.client.nom}`, 'success');
      resetForm();
      hideForm();
    }
  </script>
</body>
</html>
